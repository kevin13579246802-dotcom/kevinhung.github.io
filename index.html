<!DOCTYPE html>
<html>
<head>
    <style>
    /* 1. 設定整體畫面置中 */
    body {
        margin: 0;
        height: 100vh;          /* 強制 body 高度為整個螢幕高度 */
        display: flex;          /* 啟用 Flexbox 排版 */
        justify-content: center; /* 水平置中 */
        align-items: center;     /* 垂直置中 */
        font-family: sans-serif; /* 設定字體 */
    }

    /* 2. 讓畫面內容區塊也置中對齊 */
    .page {
        text-align: center;      /* 讓裡面的文字和按鈕置中 */
        padding: 40px;
        border: 2px solid #ccc;
        border-radius: 15px;     /* 圓角更漂亮 */
    }

    /* 3. 調整按鈕大小 */
    button {
        padding: 15px 30px;      /* 設定按鈕內距，讓按鈕變大 */
        font-size: 20px;         /* 調整按鈕文字大小 */
        cursor: pointer;         /* 滑鼠游標變成手指 */
        margin-top: 20px;        /* 與上方文字拉開距離 */
    }

    /* 隱藏畫面的設定保持不變 */
    .hidden { display: none; }
    </style>
</head>
<body>

    <div id="home-page" class="page">
        <h1>遊戲主選單</h1>
        <button onclick="showPage('game-page')">開始遊戲</button>
    </div>

    <div id="game-page" class="page hidden">
        <h1>遊戲進行中！</h1>
        <p>ㄐㄐ動畫與 我知道你在哪 功能。</p>
        <button onclick="showPage('home-page')">回首頁</button>
    </div>

    <script>
        // 切換畫面的核心函數
        function showPage(pageId) {
            // 1. 先把所有 page 隱藏
            document.querySelectorAll('.page').forEach(page => {
                page.classList.add('hidden');
            });
            // 2. 把指定的 page 顯示出來
            document.getElementById(pageId).classList.remove('hidden');
        }
    </script>
</body>
</html>
